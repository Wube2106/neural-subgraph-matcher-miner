name: Run Decoder

on:
  workflow_dispatch:

jobs:
  run-decoder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: decoder-image:latest

      - name: Create output directories
        run: |
          mkdir -p ${{ github.workspace }}/results
          chmod -R 777 ${{ github.workspace }}/results

      - name: Convert dataset
        run: |
          docker run --rm -v ${{ github.workspace }}:/app decoder-image:latest \
            python convert_hepth.py

      - name: Greedy - n_trials 50
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -e PYTHONUNBUFFERED=1 decoder-image:latest bash -c "
            python -m subgraph_mining.decoder --dataset=ca_hepth.pkl --graph_type=undirected \
              --model_path=ckpt/model.pt --node_anchored --search_strategy=greedy \
              --min_pattern_size=3 --max_pattern_size=5 --n_trials=50 --n_neighborhoods=100 \
              --out_path=results/greedy_t50.pkl 2>&1 | tee greedy_t50.log"

      - name: Greedy - n_trials 100
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -e PYTHONUNBUFFERED=1 decoder-image:latest bash -c "
            python -m subgraph_mining.decoder --dataset=ca_hepth.pkl --graph_type=undirected \
              --model_path=ckpt/model.pt --node_anchored --search_strategy=greedy \
              --min_pattern_size=3 --max_pattern_size=5 --n_trials=100 --n_neighborhoods=100 \
              --out_path=results/greedy_t100.pkl 2>&1 | tee greedy_t100.log"

      - name: Beam - width 5
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -e PYTHONUNBUFFERED=1 decoder-image:latest bash -c "
            python -m subgraph_mining.decoder --dataset=ca_hepth.pkl --graph_type=undirected \
              --model_path=ckpt/model.pt --node_anchored --search_strategy=beam --beam_width=5 \
              --min_pattern_size=3 --max_pattern_size=5 --n_trials=100 --n_neighborhoods=100 \
              --out_path=results/beam_w5.pkl 2>&1 | tee beam_w5.log"

      - name: Beam - width 10
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -e PYTHONUNBUFFERED=1 decoder-image:latest bash -c "
            python -m subgraph_mining.decoder --dataset=ca_hepth.pkl --graph_type=undirected \
              --model_path=ckpt/model.pt --node_anchored --search_strategy=beam --beam_width=10 \
              --min_pattern_size=3 --max_pattern_size=5 --n_trials=100 --n_neighborhoods=100 \
              --out_path=results/beam_w10.pkl 2>&1 | tee beam_w10.log"

      - name: MCTS - n_trials 50
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -e PYTHONUNBUFFERED=1 decoder-image:latest bash -c "
            python -m subgraph_mining.decoder --dataset=ca_hepth.pkl --graph_type=undirected \
              --model_path=ckpt/model.pt --node_anchored --search_strategy=mcts \
              --min_pattern_size=3 --max_pattern_size=5 --n_trials=50 --n_neighborhoods=100 \
              --out_path=results/mcts_t50.pkl 2>&1 | tee mcts_t50.log"

      - name: MCTS - n_trials 100
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -e PYTHONUNBUFFERED=1 decoder-image:latest bash -c "
            python -m subgraph_mining.decoder --dataset=ca_hepth.pkl --graph_type=undirected \
              --model_path=ckpt/model.pt --node_anchored --search_strategy=mcts \
              --min_pattern_size=3 --max_pattern_size=5 --n_trials=100 --n_neighborhoods=100 \
              --out_path=results/mcts_t100.pkl 2>&1 | tee mcts_t100.log"

      - name: Upload logs and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-results
          path: |
            results/
            *.log
          retention-days: 7
          if-no-files-found: warn
