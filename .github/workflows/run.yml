name: Run Decoder

on:
  workflow_dispatch:

jobs:
  run-decoder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: decoder-image:latest

      - name: Create output directories
        run: |
          mkdir -p ${{ github.workspace }}/plots/cluster
          mkdir -p ${{ github.workspace }}/results
          chmod -R 777 ${{ github.workspace }}/plots
          chmod -R 777 ${{ github.workspace }}/results

      - name: Verify inputs
        run: |
          test -f ${{ github.workspace }}/ca-HepTh.txt.gz
          test -f ${{ github.workspace }}/ckpt/model.pt

      - name: Convert dataset
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            decoder-image:latest \
            python convert_hepth.py

      - name: Run decoder - Greedy
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -e PYTHONUNBUFFERED=1 \
            decoder-image:latest \
            bash -c "
              python -m subgraph_mining.decoder \
                --dataset=ca_hepth.pkl \
                --graph_type=undirected \
                --model_path=ckpt/model.pt \
                --node_anchored \
                --search_strategy=greedy \
                --n_trials=100 \
                --n_neighborhoods=100 \
                --out_path=results/ca_hepth_greedy.pkl \
                2>&1 | tee ca_hepth_greedy.log
            "

      - name: Run decoder - Beam
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -e PYTHONUNBUFFERED=1 \
            decoder-image:latest \
            bash -c "
              python -m subgraph_mining.decoder \
                --dataset=ca_hepth.pkl \
                --graph_type=undirected \
                --model_path=ckpt/model.pt \
                --node_anchored \
                --search_strategy=beam \
                --beam_width=5 \
                --n_trials=100 \
                --n_neighborhoods=100 \
                --out_path=results/ca_hepth_beam.pkl \
                2>&1 | tee ca_hepth_beam.log
            "

      - name: Run decoder - MCTS
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -e PYTHONUNBUFFERED=1 \
            decoder-image:latest \
            bash -c "
              python -m subgraph_mining.decoder \
                --dataset=ca_hepth.pkl \
                --graph_type=undirected \
                --model_path=ckpt/model.pt \
                --node_anchored \
                --search_strategy=mcts \
                --n_trials=100 \
                --n_neighborhoods=100 \
                --out_path=results/ca_hepth_mcts.pkl \
                2>&1 | tee ca_hepth_mcts.log
            "

      - name: Check generated files
        run: |
          ls -R plots/ || echo "No plots directory found"
          ls -R results/ || echo "No results directory found"

      - name: Upload plots and results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ca-hepth-results
          path: |
            plots/
            results/
            *.log
          retention-days: 7
          if-no-files-found: warn
